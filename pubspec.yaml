name: insti
description: Task Buddy Max - A high-performance productivity and gamification engine.
publish_to: 'none' # Prevent accidental publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Standard Icons
  cupertino_icons: ^1.0.6

  # Core Logic & Persistence
  shared_preferences: ^2.2.2
  
  # Advanced UI & Theming
  flutter_animate: ^4.2.0
  google_fonts: ^6.1.0
  
  # Data Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
